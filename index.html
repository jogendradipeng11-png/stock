<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StoreVault • Inventory Management</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
body { font-family: 'Inter', system-ui, sans-serif; }
.heading-font { font-family: 'Space Grotesk', sans-serif; }
.glass { background: rgba(255,255,255,0.08); backdrop-filter: blur(20px); }
.low-stock { background:#7f1d1d!important;color:#fca5a5 }
.high-stock{ background:#1e3a8a!important;color:#93c5fd }
.toast { animation: slideIn .4s ease forwards }
@keyframes slideIn{from{transform:translateY(40px);opacity:0}to{transform:none;opacity:1}}
</style>
</head>

<body class="bg-slate-950 text-slate-200 min-h-screen">

<!-- LOGIN -->
<div id="login-modal" class="fixed inset-0 bg-black/90 flex items-center justify-center z-[10000]">
<div class="glass w-full max-w-md p-10 rounded-3xl text-center">
<h1 class="heading-font text-5xl mb-2">StoreVault</h1>
<p class="text-cyan-400 mb-8">Inventory Management</p>
<input placeholder="Username" class="w-full px-6 py-4 bg-slate-900 rounded-2xl mb-4">
<input type="password" placeholder="Password" class="w-full px-6 py-4 bg-slate-900 rounded-2xl mb-6">
<button onclick="attemptLogin()" class="w-full h-12 bg-gradient-to-r from-cyan-400 to-blue-500 text-black rounded-3xl font-bold">LOGIN</button>
<p class="text-xs text-slate-400 mt-6">Demo: admin / 1234</p>
</div>
</div>

<!-- MAIN APP -->
<div id="main-app" class="hidden">

<!-- NAV -->
<nav class="bg-slate-900/80 border-b border-white/10 sticky top-0 z-50 backdrop-blur-xl">
<div class="max-w-screen-2xl mx-auto px-8 py-5 flex justify-between items-center">
<div class="flex gap-3 items-center">
<div class="w-10 h-10 rounded-2xl bg-gradient-to-br from-cyan-400 to-blue-500 flex justify-center items-center">
<i class="fa-solid fa-boxes-stacked text-white"></i>
</div>
<h1 class="heading-font text-3xl">StoreVault</h1>
</div>

<div class="flex gap-3 items-center text-sm">
<button onclick="exportCSV()" class="bg-slate-700 px-5 h-10 rounded-3xl">Export</button>
<button onclick="exportTransactionsCSV()" class="bg-slate-700 px-5 h-10 rounded-3xl">Transactions</button>
<button onclick="importCSV()" class="bg-amber-600 px-5 h-10 rounded-3xl">Import CSV</button>
<button id="save-btn" onclick="manualSaveToGoogle()" class="bg-emerald-600 px-6 h-10 rounded-3xl">Save to Cloud</button>
<button onclick="openNewEntryModal()" class="bg-gradient-to-r from-cyan-400 to-blue-500 text-black px-6 h-11 rounded-3xl font-semibold">NEW ENTRY</button>
</div>
</div>
</nav>

<div class="max-w-screen-2xl mx-auto px-8 py-8">

<div class="flex justify-between items-center mb-8">
<h2 class="text-5xl heading-font">Store Inventory</h2>
<input id="search-input" onkeyup="filterTable()" placeholder="Search..."
class="w-96 px-6 py-3 bg-slate-900 border border-white/10 rounded-3xl outline-none">
</div>

<div class="glass rounded-3xl overflow-hidden mb-12">
<table class="w-full">
<thead class="bg-slate-900 text-xs uppercase">
<tr>
<th class="px-8 py-5 text-left">Material</th>
<th class="px-4 py-5 text-left">SAP</th>
<th class="px-4 py-5 text-left">Name</th>
<th class="px-4 py-5 text-left">Description</th>
<th class="px-4 py-5 text-center">Stock</th>
<th class="px-4 py-5 text-center">Min</th>
<th class="px-4 py-5 text-center">Max</th>
<th class="px-8 py-5 text-right">Actions</th>
</tr>
</thead>
<tbody id="inventory-table-body"></tbody>
</table>
</div>

<div class="glass rounded-3xl overflow-hidden">
<div class="px-8 py-5 bg-slate-900/50 border-b border-white/10">Recent Transactions</div>
<table class="w-full">
<thead class="bg-slate-900 text-xs uppercase">
<tr>
<th class="px-8 py-5 text-left">Date</th>
<th class="px-4 py-5">Material</th>
<th class="px-4 py-5">Part</th>
<th class="px-4 py-5 text-center">IN</th>
<th class="px-4 py-5 text-center">OUT</th>
<th class="px-4 py-5">Reason</th>
</tr>
</thead>
<tbody id="transactions-table-body"></tbody>
</table>
</div>

</div>
</div>

<input type="file" id="csv-import" accept=".csv" hidden onchange="handleCSVImport(event)">

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyMq42ZRu_lW5cJZZD15jKvM8RBeZ4939lS-7jYcB8N1Rp0YvafVrCw2j7OGvfTHRI/exec";

let inventory = [];
let transactions = [];

function toast(msg){const t=document.createElement("div");t.className="toast fixed bottom-5 right-5 glass px-6 py-4 rounded-2xl";t.innerHTML="✅ "+msg;document.body.appendChild(t);setTimeout(()=>t.remove(),3500);}

async function googleFetch(q){const r=await fetch(WEB_APP_URL+q);return await r.json();}
async function sendToGoogle(action,payload){
return fetch(WEB_APP_URL,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({action,data:payload})
}).then(r=>r.json());
}

async function loadFromGoogle(){
const r=await googleFetch("?action=get");
if(r.success){inventory=r.inventory||[];transactions=r.transactions||[];}
}

async function manualSaveToGoogle(){
await sendToGoogle("save",{inventory,transactions});
toast("Saved to Google Sheets");
}

async function attemptLogin(){
await loadFromGoogle();
document.getElementById("login-modal").style.display="none";
document.getElementById("main-app").classList.remove("hidden");
renderInventory();renderTransactions();
}

function renderInventory(){
const b=document.getElementById("inventory-table-body");b.innerHTML="";
inventory.forEach(i=>{
b.innerHTML+=`
<tr class="${i.stock<i.minStock?'low-stock':i.stock>i.maxStock?'high-stock':''}">
<td class="px-8 py-5">#${i.id}</td>
<td class="px-4 py-5">${i.sapNumber||''}</td>
<td class="px-4 py-5 font-semibold">${i.name}</td>
<td class="px-4 py-5 text-slate-400">${i.description||''}</td>
<td class="px-4 py-5 text-center font-bold">${i.stock}</td>
<td class="px-4 py-5 text-center">${i.minStock}</td>
<td class="px-4 py-5 text-center">${i.maxStock}</td>
<td class="px-8 py-5 text-right">
<button onclick="editPart(${i.id})" class="text-emerald-400 mr-3">✏</button>
<button onclick="deletePart(${i.id})" class="text-rose-400">🗑</button>
</td></tr>`;
});
}

function renderTransactions(){
const b=document.getElementById("transactions-table-body");b.innerHTML="";
transactions.slice(0,20).forEach(t=>{
b.innerHTML+=`
<tr>
<td class="px-8 py-5">${t.date}</td>
<td class="px-4 py-5">#${t.materialId}</td>
<td class="px-4 py-5">${t.partName}</td>
<td class="px-4 py-5 text-center text-emerald-400">${t.qtyIn?`+${t.qtyIn}`:"—"}</td>
<td class="px-4 py-5 text-center text-rose-400">${t.qtyOut?`-${t.qtyOut}`:"—"}</td>
<td class="px-4 py-5 text-slate-400">${t.reason}</td>
</tr>`;
});
}

function importCSV(){document.getElementById("csv-import").click();}
function exportCSV(){}
function exportTransactionsCSV(){}
function filterTable(){}
function openNewEntryModal(){}
function closeModals(){}
function editPart(){}
function deletePart(){}
function handleCSVImport(){}

window.onload = attemptLogin;
</script>
</body>
</html>
